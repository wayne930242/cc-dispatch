version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ccd
    main: ./cmd/ccd
    binary: ccd
    env: ["CGO_ENABLED=0"]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: ccd
    name_template: "cc-dispatch_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: wayne930242
    name: cc-dispatch
  draft: false
  prerelease: auto
